site_name: "Evidential"
site_description: "Evidential Documentation"
site_url: https://docs.evidential.dev/
repo_url: https://github.com/agency-fund/evidential-be
extra:
  generator: false
  social:
    - icon: material/shield-lock
      link: https://www.idinsight.org/about/privacy-policy/
      name: Privacy Policy

theme:
  name: material
  custom_dir: overrides
  icon:
    logo: material/cog
    admonition:
      note: material/alert-circle
    annotation: material/help-circle
  font:
    text: "Inter"
    code: "Roboto Mono"
  palette:
    - scheme: slate # Palette toggle for dark mode
      primary: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default # Palette toggle for light mode
      primary: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - content.code.annotate
    - content.code.copy
    - navigation.sections
    - navigation.indexes
    - navigation.top

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      title: On this page
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

plugins:
  - glightbox
  - search
  - blog:
      post_excerpt: required
  - open-in-new-tab
  - redirects:
      redirect_maps:
        'welcome/index.md': 'index.md'

nav:
  - Welcome:
    - index.md
    - welcome/getting-started.md
  - Developing:
    - development/getting-started-dev.md
    - Contributing:
      - development/contributing.md
      - maintainer_guide.md
    - How-To Guides:
      - development/airplane-mode.md
      - development/enabling-oidc.md
      - development/testing.md
      - development/updating-testing-dwh.md
      - development/sqlalchemy.md
      - development/migration.md
    - Explainers:
      - development/secrets.md
      - development/task-queues.md
      - development/reading-list.md
      - development/faq.md
  - Integrating:
    - integration/overview.md
    - integration/integration.md
#  - Latest Updates: blog/index.md
  - Contact us: contact.md
