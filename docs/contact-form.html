<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form</title>
    <style>
      .contact-form-container {
        max-width: 600px;
        margin: 2rem auto;
        padding: 2rem;
        background: var(--md-default-bg-color, #ffffff);
        border-radius: 12px;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
        border: 1px solid var(--md-default-fg-color--lightest, #e5e7eb);
      }

      .form-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--md-default-fg-color, #374151);
        margin-bottom: 1.5rem;
        text-align: center;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-label {
        display: block;
        font-weight: 500;
        color: var(--md-default-fg-color, #374151);
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
      }

      .form-input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid var(--md-default-fg-color--lightest, #d1d5db);
        border-radius: 6px;
        font-size: 1rem;
        color: var(--md-default-fg-color, #374151);
        background-color: var(--md-default-bg-color, #ffffff);
        transition:
          border-color 0.2s ease-in-out,
          box-shadow 0.2s ease-in-out;
        box-sizing: border-box;
      }

      .form-input:focus {
        outline: none;
        border-color: var(--md-accent-fg-color, #2563eb);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      .form-textarea {
        resize: vertical;
        min-height: 120px;
        font-family: inherit;
      }

      .form-button {
        width: 100%;
        padding: 0.875rem 1.5rem;
        background-color: var(--md-accent-fg-color, #2563eb);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition:
          background-color 0.2s ease-in-out,
          transform 0.1s ease-in-out;
      }

      .form-button:hover {
        background-color: var(--md-accent-fg-color--dark, #1d4ed8);
        transform: translateY(-1px);
      }

      .form-button:active {
        transform: translateY(0);
      }

      .form-button:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
        transform: none;
      }

      .success-message {
        display: none;
        padding: 1rem;
        background-color: #d1fae5;
        border: 1px solid #10b981;
        border-radius: 6px;
        color: #065f46;
        margin-bottom: 1rem;
        text-align: center;
      }

      .error-message {
        display: none;
        padding: 1rem;
        background-color: #fee2e2;
        border: 1px solid #ef4444;
        border-radius: 6px;
        color: #991b1b;
        margin-bottom: 1rem;
        text-align: center;
      }

      /* Dark mode support */
      [data-md-color-scheme="slate"] .contact-form-container {
        background: var(--md-default-bg-color, #1e293b);
        border-color: var(--md-default-fg-color--lightest, #334155);
      }

      [data-md-color-scheme="slate"] .form-input {
        background-color: var(--md-default-bg-color, #1e293b);
        border-color: var(--md-default-fg-color--lightest, #334155);
      }

      /* Responsive design */
      @media (max-width: 768px) {
        .contact-form-container {
          margin: 1rem;
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="contact-form-container">
      <h2 class="form-title">Get in Touch</h2>

      <div class="success-message" id="successMessage">
        Thank you for your message! We'll get back to you soon.
      </div>

      <div class="error-message" id="errorMessage">
        Sorry, there was an error sending your message. Please try again.
      </div>

      <form
        id="contactForm"
        action="https://formspree.io/f/mldnqgra"
        method="POST"
      >
        <div class="form-group">
          <label class="form-label" for="name">Your Name</label>
          <input
            type="text"
            id="name"
            name="name"
            class="form-input"
            required
            placeholder="Enter your full name"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Your Email</label>
          <input
            type="email"
            id="email"
            name="_replyto"
            class="form-input"
            required
            placeholder="Enter your email address"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="message">Your Message</label>
          <textarea
            id="message"
            name="message"
            class="form-input form-textarea"
            required
            placeholder="Tell us about your project or how we can help..."
          ></textarea>
        </div>

        <button type="submit" class="form-button" id="submitBtn">
          Send Message
        </button>
      </form>
    </div>

    <script>
      document
        .getElementById("contactForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const form = e.target;
          const submitBtn = document.getElementById("submitBtn");
          const successMessage = document.getElementById("successMessage");
          const errorMessage = document.getElementById("errorMessage");

          // Hide previous messages
          successMessage.style.display = "none";
          errorMessage.style.display = "none";

          // Update button state
          submitBtn.disabled = true;
          submitBtn.textContent = "Sending...";

          // Create FormData object
          const formData = new FormData(form);

          // Send the form data
          fetch(form.action, {
            method: "POST",
            body: formData,
            headers: {
              Accept: "application/json",
            },
          })
            .then((response) => {
              if (response.ok) {
                successMessage.style.display = "block";
                form.reset();
              } else {
                throw new Error("Form submission failed");
              }
            })
            .catch((error) => {
              errorMessage.style.display = "block";
            })
            .finally(() => {
              submitBtn.disabled = false;
              submitBtn.textContent = "Send Message";
            });
        });
    </script>
  </body>
</html>
